openapi: 3.0.0
info:
  title: API Relógio de Ponto ControlID (iDClass)
  description: |
    Documentação completa dos endpoints encontrados no equipamento ControlID iDClass.
    Esta API utiliza predominantemente o método **POST** e requer um token de sessão na query string para a maioria das chamadas.
  version: 1.0.0
servers:
  - url: https://{device_ip}
    variables:
      device_ip:
        default: 192.168.0.129
        description: Endereço IP do relógio de ponto iDClass.

tags:
  - name: Autenticação e Sessão
  - name: Gerenciamento de Usuários
  - name: Biometria e Facial
  - name: Coleta de Dados (AFD)
  - name: Configuração do Sistema

paths:
  /login.fcgi:
    post:
      tags: [Autenticação e Sessão]
      summary: Login
      description: Inicia uma sessão no equipamento.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                login: {type: string, default: admin}
                password: {type: string, default: admin}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  session: {type: string}

  /logout.fcgi:
    post:
      tags: [Autenticação e Sessão]
      summary: Logout
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK

  /session_is_valid.fcgi:
    post:
      tags: [Autenticação e Sessão]
      summary: Validar Sessão
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK

  /add_users.fcgi:
    post:
      tags: [Gerenciamento de Usuários]
      summary: Adicionar Usuários
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    $ref: '#/components/schemas/User'
      responses:
        '200':
          description: OK

  /load_users.fcgi:
    post:
      tags: [Gerenciamento de Usuários]
      summary: Listar Usuários
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

  /remove_users.fcgi:
    post:
      tags: [Gerenciamento de Usuários]
      summary: Remover Usuários
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                where: {type: object}
      responses:
        '200':
          description: OK

  /get_afd.fcgi:
    post:
      tags: [Coleta de Dados (AFD)]
      summary: Obter AFD (Arquivo de Fonte de Dados)
      description: |
        Obtém o arquivo AFD do REP. Suporta o formato da Portaria 671 se o parâmetro `mode=671` for enviado.
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
        - name: mode
          in: query
          description: Use 671 para o formato da Portaria 671.
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                initial_date:
                  type: object
                  properties:
                    day: {type: integer}
                    month: {type: integer}
                    year: {type: integer}
                initial_nsr:
                  type: integer
                  description: "Retorna as marcações a partir da NSR informada até o final."
      responses:
        '200':
          description: OK - Retorna o conteúdo do arquivo AFD.
          content:
            text/plain:
              schema:
                type: string
              example: |
                0000000001108613254000944000000000000TB COMERCIO DE PRESENTES S.A                                                                                                                          000240009300046202102202420032024210320241158
                0001431213210220240624013302422937
                0001431223210220240635012328872451
                0001431233210220240654013498235930
                0001431243210220240654015679670104
                0001431253210220240656020790077048
                0001431263210220240658012849148891
                0001431273210220240658012527432648
                0001431283210220240721020780935041
                0001431293210220240736021249967238

  /get_system_information.fcgi:
    post:
      tags: [Configuração do Sistema]
      summary: Informações do Sistema
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK

  /set_system_date_time.fcgi:
    post:
      tags: [Configuração do Sistema]
      summary: Ajustar Data e Hora
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                day: {type: integer}
                month: {type: integer}
                year: {type: integer}
                hour: {type: integer}
                minute: {type: integer}
                second: {type: integer}
      responses:
        '200':
          description: OK

  /remote_enroll.fcgi:
    post:
      tags: [Biometria e Facial]
      summary: Cadastro Remoto (Biometria/Facial)
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: {type: integer}
                type: {type: string, enum: [biometry, facial]}
      responses:
        '200':
          description: OK

  /get_system_configuration.fcgi:
    post:
      tags: [Configuração do Sistema]
      summary: Obter Configurações do Sistema
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK

  /get_about.fcgi:
    post:
      tags: [Configuração do Sistema]
      summary: Informações do REP
      description: Obtém informações do REP como MAC, Número de Série e Versão do Firmware.
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  mac: {type: string}
                  nSerie: {type: string}
                  versionFW: {type: integer}
                  versionMRP: {type: integer}
                  isFacial: {type: boolean}

  /count_users.fcgi:
    post:
      tags: [Gerenciamento de Usuários]
      summary: Contagem de Usuários
      description: Retorna a quantidade total de usuários cadastrados no equipamento.
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: {type: integer}

  /update_users.fcgi:
    post:
      tags: [Gerenciamento de Usuários]
      summary: Atualizar Usuários
      description: Atualiza os dados de usuários existentes. Suporta o modo 671 para CPF.
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
        - name: mode
          in: query
          schema: {type: string}
          description: Use 671 para suporte a CPF.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    $ref: '#/components/schemas/User'
      responses:
        '200':
          description: OK

  /remove_admins.fcgi:
    post:
      tags: [Gerenciamento de Usuários]
      summary: Remover Administradores
      description: Remove todos os privilégios de administrador de todos os usuários.
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK

  /get_system_date_time.fcgi:
    post:
      tags: [Configuração do Sistema]
      summary: Obter Data e Hora
      description: Retorna a data e hora atual configurada no equipamento.
      parameters:
        - name: session
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  day: {type: integer}
                  month: {type: integer}
                  year: {type: integer}
                  hour: {type: integer}
                  minute: {type: integer}
                  second: {type: integer}

components:
  schemas:
    User:
      type: object
      properties:
        id: {type: integer}
        name: {type: string}
        registration: {type: string}
        password: {type: string}
        salt: {type: string}
        privilege: {type: string, enum: [user, admin]}
